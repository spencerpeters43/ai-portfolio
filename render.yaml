services:
  - type: web
    name: ai-portfolio
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn ai_portfolio.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-portfolio-db
          property: connectionString

databases:
  - name: ai-portfolio-db
    plan: free
    databaseName: ai_portfolio
    user: ai_portfolio
